name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip
        run: unzip SpawnPlugin.zip
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: cd SpawnPlugin && mvn package
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: SpawnPlugin
          path: SpawnPlugin/target/SpawnPlugin.jar
